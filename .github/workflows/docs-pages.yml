name: Docs Pages

on:
  pull_request:
    branches: [main]
    paths:
      - "docs-site/**"
      - "apps/web/**"
      - "packages/shared/**"
      - "scripts/write-version.mjs"
      - "package.json"
      - "bun.lock"
      - "README.md"
      - "README.zh-CN.md"
      - ".github/workflows/docs-pages.yml"
      - ".github/scripts/assemble-pages-site.sh"
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - "apps/web/**"
      - "packages/shared/**"
      - "scripts/write-version.mjs"
      - "package.json"
      - "bun.lock"
      - "README.md"
      - "README.zh-CN.md"
      - ".github/workflows/docs-pages.yml"
      - ".github/scripts/assemble-pages-site.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compute DOCS_BASE
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY##*/}"
          if [[ "${repo}" == "${owner}.github.io" ]]; then
            echo "DOCS_BASE=/" >> "${GITHUB_ENV}"
          else
            echo "DOCS_BASE=/${repo}/" >> "${GITHUB_ENV}"
          fi

      - name: Build docs site
        shell: bash
        run: |
          set -euo pipefail
          DOCS_BASE="${DOCS_BASE}" bun run --cwd docs-site build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site-build
          path: docs-site/doc_build
          retention-days: 1
          if-no-files-found: error

  build-storybook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Storybook
        run: bun run build-storybook

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static-build
          path: apps/web/storybook-static
          retention-days: 1
          if-no-files-found: error

  assemble-pages:
    runs-on: ubuntu-latest
    needs: [build-docs, build-storybook]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-site-build
          path: .tmp/docs-site

      - name: Download Storybook artifact
        uses: actions/download-artifact@v4
        with:
          name: storybook-static-build
          path: .tmp/storybook-static

      - name: Assemble Pages site
        shell: bash
        run: |
          set -euo pipefail
          bash ./.github/scripts/assemble-pages-site.sh .tmp/docs-site .tmp/storybook-static .tmp/pages-site

      - name: Smoke check assembled site
        shell: bash
        run: |
          set -euo pipefail
          test -f .tmp/pages-site/index.html
          test -f .tmp/pages-site/storybook/index.html
          test -f .tmp/pages-site/storybook.html
          grep -q '/storybook.html' .tmp/pages-site/index.html
          grep -q 'Redirecting to Storybook' .tmp/pages-site/storybook.html

      - name: Upload assembled Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-site-build
          path: .tmp/pages-site
          retention-days: 1
          if-no-files-found: error

  deploy:
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: [assemble-pages]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download assembled Pages site artifact
        uses: actions/download-artifact@v4
        with:
          name: pages-site-build
          path: .tmp/pages-site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .tmp/pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
