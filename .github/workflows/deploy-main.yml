name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PAGES_PROJECT_NAME: ${{ vars.CF_PAGES_PROJECT_NAME }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_DEMO_MODE: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write version metadata
        run: bun run version:write

      - name: Apply D1 migrations
        run: bun run --cwd apps/api-worker db:migrate:remote

      - name: Deploy Worker
        run: bunx wrangler deploy --config apps/api-worker/wrangler.jsonc

      - name: Deploy Email receiver Worker
        run: bunx wrangler deploy --config apps/api-worker/wrangler.email.jsonc

      - name: Build web app
        run: bun run --cwd apps/web build

      - name: Deploy Pages
        run: bunx wrangler pages deploy apps/web/dist --project-name "${CF_PAGES_PROJECT_NAME:-cf-mail}" --branch main
