name: Deploy

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to deploy
        required: false
        type: string
      release_sha:
        description: Release commit SHA to deploy
        required: false
        type: string
      release_branch:
        description: Source branch name for the release
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && github.event.action == 'published') }}
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_DEPLOY_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOY_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PAGES_PROJECT_NAME: ${{ vars.CF_PAGES_PROJECT_NAME }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_DEMO_MODE: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag || inputs.release_sha || 'main' }}

      - name: Fetch release tags
        run: git fetch --tags origin

      - name: Resolve deployed release metadata
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            release_tag="${{ github.event.release.tag_name }}"
            release_version="${release_tag#v}"
            release_branch="${{ github.event.release.target_commitish || 'main' }}"
          else
            requested_release_tag="${{ inputs.release_tag }}"
            requested_release_sha="${{ inputs.release_sha }}"
            checked_out_sha="$(git rev-parse HEAD)"
            release_branch="${{ inputs.release_branch || 'main' }}"

            if [ -n "${requested_release_sha}" ] && [ "${requested_release_sha}" != "${checked_out_sha}" ]; then
              echo "workflow_dispatch release_sha ${requested_release_sha} does not match the checked-out commit ${checked_out_sha}." >&2
              exit 1
            fi

            if [ -n "${requested_release_tag}" ]; then
              tag_commit_sha="$(git rev-parse --verify "${requested_release_tag}^{commit}" 2>/dev/null || true)"
              if [ -z "${tag_commit_sha}" ]; then
                echo "workflow_dispatch release_tag ${requested_release_tag} does not resolve to a fetched commit." >&2
                exit 1
              fi

              if [ "${tag_commit_sha}" != "${checked_out_sha}" ]; then
                echo "workflow_dispatch release_tag ${requested_release_tag} points at ${tag_commit_sha}, but checkout resolved to ${checked_out_sha}; deploy inputs must reference the same release." >&2
                exit 1
              fi

              release_tag="${requested_release_tag}"
            else
              release_tag="$(git tag --points-at HEAD --list 'v*' | sort -V | tail -n 1)"
            fi

            if [ -z "${release_tag}" ]; then
              echo "workflow_dispatch requires release_tag or a tag pointing at the checked out commit" >&2
              exit 1
            fi

            release_version="${release_tag#v}"
          fi

          echo "CF_MAIL_RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"
          echo "CF_MAIL_RELEASE_VERSION=${release_version}" >> "${GITHUB_ENV}"
          echo "CF_MAIL_RELEASE_SHA=$(git rev-parse --short HEAD)" >> "${GITHUB_ENV}"
          echo "CF_MAIL_RELEASE_BRANCH=${release_branch}" >> "${GITHUB_ENV}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write version metadata
        run: bun run version:write

      - name: Resolve Cloudflare deploy token
        shell: bash
        run: |
          set -euo pipefail
          token="${CLOUDFLARE_DEPLOY_API_TOKEN:-}"
          if [ -z "${token}" ]; then
            token="${CLOUDFLARE_API_TOKEN:-}"
          fi

          if [ -z "${token}" ]; then
            echo "Missing Cloudflare deploy token. Set CLOUDFLARE_DEPLOY_API_TOKEN or fall back to CLOUDFLARE_API_TOKEN." >&2
            exit 1
          fi

          echo "CLOUDFLARE_API_TOKEN=${token}" >> "${GITHUB_ENV}"

      - name: Verify API Worker required secrets
        shell: bash
        run: |
          set -euo pipefail
          secrets_json="$(bunx wrangler secret list --config apps/api-worker/wrangler.jsonc --format json)"
          export SECRETS_JSON="${secrets_json}"
          node <<'NODE'
          const secrets = JSON.parse(process.env.SECRETS_JSON ?? "[]");
          const names = new Set(secrets.map((secret) => secret.name));
          const required = ["SESSION_SECRET"];
          const missing = required.filter((name) => !names.has(name));

          if (missing.length > 0) {
            console.error(
              `Missing required API Worker secrets: ${missing.join(", ")}`,
            );
            console.error(
              "Set them in Cloudflare before deploying, for example with `wrangler secret put <NAME>`.",
            );
            process.exit(1);
          }

          console.log(`Verified API Worker secrets: ${required.join(", ")}`);
          NODE

      - name: Detect D1 migration changes in release
        shell: bash
        run: |
          set -euo pipefail
          release_tags=()
          while IFS= read -r tag; do
            release_tags+=("${tag}")
          done < <(git tag --sort=v:refname --list 'v*')
          previous_release_tag=""
          found_target="false"

          for index in "${!release_tags[@]}"; do
            if [ "${release_tags[$index]}" != "${CF_MAIL_RELEASE_TAG}" ]; then
              continue
            fi

            found_target="true"
            if [ "$index" -gt 0 ]; then
              previous_release_tag="${release_tags[$((index - 1))]}"
            fi
            break
          done

          if [ "${found_target}" != "true" ]; then
            echo "Release tag ${CF_MAIL_RELEASE_TAG} is not present in the fetched v* tag set; automatic deploy requires a tagged release commit." >&2
            exit 1
          fi

          if [ -z "${previous_release_tag}" ]; then
            echo "Cannot determine a previous release tag for ${CF_MAIL_RELEASE_TAG}; bootstrap or migration-bearing releases must use manual rollout." >&2
            exit 1
          fi

          if git diff --name-only "${previous_release_tag}..${CF_MAIL_RELEASE_TAG}" -- apps/api-worker/drizzle | grep -q .; then
            echo "Release ${CF_MAIL_RELEASE_TAG} changes D1 migrations relative to ${previous_release_tag}; automatic rollback-backed deploy is disabled. Use the manual migration rollout path." >&2
            exit 1
          fi

          echo "Verified ${CF_MAIL_RELEASE_TAG} has no D1 migration diff relative to ${previous_release_tag}."

      - name: Capture current API Worker rollback target
        shell: bash
        run: |
          set -euo pipefail
          deployments_json="$(bunx wrangler deployments list --config apps/api-worker/wrangler.jsonc --json)"
          export DEPLOYMENTS_JSON="${deployments_json}"
          node <<'NODE' | tee -a "${GITHUB_ENV}"
          const deployments = JSON.parse(process.env.DEPLOYMENTS_JSON ?? "[]");
          const latest = [...deployments]
            .sort((a, b) => a.created_on.localeCompare(b.created_on))
            .at(-1);

          if (!latest) {
            console.error(
              "Automated deploy requires an existing stable API deployment so failed smoke checks can roll back safely. Bootstrap the first production release manually.",
            );
            process.exit(1);
          }

          const stable = latest.versions?.find((version) => version.percentage === 100);
          if (!stable?.version_id) {
            console.error(
              "Current API deployment does not expose a single 100% stable version, so the workflow cannot capture a safe rollback target.",
            );
            process.exit(1);
          }

          console.log(`API_ROLLBACK_VERSION_ID=${stable.version_id}`);
          NODE

      - name: Verify no pending remote D1 migrations
        shell: bash
        run: |
          set -euo pipefail
          pending_migrations_output="$(bunx wrangler d1 migrations list kaisoumail-db --remote --config apps/api-worker/wrangler.jsonc)"

          case "${pending_migrations_output}" in
            *"✅ No migrations to apply!"*)
              echo "Verified remote D1 has no pending migrations."
              ;;
            *"Migrations to be applied:"*)
              printf '%s\n' "${pending_migrations_output}"
              echo "Remote D1 still has unapplied migrations; automatic rollback-backed deploy requires zero pending remote migrations. Use the manual migration rollout path." >&2
              exit 1
              ;;
            *)
              printf '%s\n' "${pending_migrations_output}"
              echo "Unable to confirm remote D1 migration state; automatic rollback-backed deploy fails closed until the migration state is reviewed manually." >&2
              exit 1
              ;;
          esac

      - name: Deploy Worker
        run: bunx wrangler deploy --config apps/api-worker/wrangler.jsonc

      - name: Smoke test deployed API Worker
        shell: bash
        env:
          API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          set -euo pipefail
          api_base_url="${API_BASE_URL%/}"
          if [ -z "${api_base_url}" ]; then
            echo "Missing VITE_API_BASE_URL for deploy smoke gate" >&2
            exit 1
          fi

          health_file="${RUNNER_TEMP}/api-health.json"
          version_file="${RUNNER_TEMP}/api-version.json"

          for attempt in 1 2 3 4 5 6; do
            health_code="$(curl -sS -o "${health_file}" -w "%{http_code}" "${api_base_url}/health" || true)"
            version_code="$(curl -sS -o "${version_file}" -w "%{http_code}" "${api_base_url}/api/version" || true)"

            export HEALTH_CODE="${health_code}"
            export VERSION_CODE="${version_code}"
            export HEALTH_FILE="${health_file}"
            export VERSION_FILE="${version_file}"
            export EXPECTED_SHA="${CF_MAIL_RELEASE_SHA}"

            if node <<'NODE'
            const fs = require("node:fs");

            const healthCode = process.env.HEALTH_CODE;
            const versionCode = process.env.VERSION_CODE;
            const expectedSha = process.env.EXPECTED_SHA;

            if (versionCode !== "200") {
              console.error(
                `Unexpected status code: /api/version=${versionCode}`,
              );
              process.exit(1);
            }

            const version = JSON.parse(fs.readFileSync(process.env.VERSION_FILE, "utf8"));

            if (healthCode !== "200") {
              console.error(
                `Unexpected status code: /health=${healthCode}`,
              );
              process.exit(1);
            }

            const health = JSON.parse(fs.readFileSync(process.env.HEALTH_FILE, "utf8"));
            if (health?.ok !== true) {
              console.error(`Unexpected /health payload: ${JSON.stringify(health)}`);
              process.exit(1);
            }

            if (version?.commitSha !== expectedSha) {
              console.error(
                `Expected deployed commit ${expectedSha}, received ${version?.commitSha ?? "<missing>"}`,
              );
              process.exit(1);
            }

            console.log(`Smoke gate passed for deployed commit ${version.commitSha}`);
            NODE
            then
              exit 0
            fi

            echo "Deploy smoke gate attempt ${attempt} not ready yet; retrying..."
            echo "/health => ${health_code} $(cat "${health_file}" 2>/dev/null || true)"
            echo "/api/version => ${version_code} $(cat "${version_file}" 2>/dev/null || true)"

            if [ "${attempt}" -eq 6 ]; then
              echo "Deployed API Worker failed smoke gate after ${attempt} attempts" >&2
              echo "Rolling API Worker back to ${API_ROLLBACK_VERSION_ID}" >&2
              bunx wrangler rollback "${API_ROLLBACK_VERSION_ID}" \
                --config apps/api-worker/wrangler.jsonc \
                --message "Rollback failed deploy smoke gate for ${CF_MAIL_RELEASE_SHA}" \
                --yes
              exit 1
            fi

            sleep "$((attempt * 5))"
          done

      - name: Deploy Email receiver Worker
        run: bunx wrangler deploy --config apps/api-worker/wrangler.email.jsonc

      - name: Build web app
        run: bun run --cwd apps/web build

      - name: Deploy Pages
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if bunx wrangler pages deploy apps/web/dist --project-name "${CF_PAGES_PROJECT_NAME:-kaisoumail}" --branch main; then
              exit 0
            fi

            if [ "${attempt}" -eq 3 ]; then
              echo "Cloudflare Pages deploy failed after ${attempt} attempts" >&2
              exit 1
            fi

            sleep "$((attempt * 15))"
          done
