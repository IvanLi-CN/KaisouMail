name: Deploy

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      operation:
        description: Deploy the latest release or restore D1 from Time Travel
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - restore-d1
      release_tag:
        description: Release tag to deploy
        required: false
        type: string
      release_sha:
        description: Release commit SHA to deploy
        required: false
        type: string
      release_branch:
        description: Source branch name for the release
        required: false
        type: string
      restore_timestamp:
        description: RFC3339 or Unix timestamp to restore D1 to (restore-d1 only)
        required: false
        type: string
      restore_bookmark:
        description: D1 Time Travel bookmark to restore to (restore-d1 only)
        required: false
        type: string
      restore_reason:
        description: Human-readable reason for the D1 restore (restore-d1 only)
        required: false
        type: string

concurrency:
  group: deploy-main-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && github.event.action == 'published') }}
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_DEPLOY_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOY_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PAGES_PROJECT_NAME: ${{ vars.CF_PAGES_PROJECT_NAME }}
      CF_PAGES_SMOKE_ORIGINS: ${{ vars.CF_PAGES_SMOKE_ORIGINS }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_DEMO_MODE: "false"
      WRANGLER_BIN: ./apps/api-worker/node_modules/.bin/wrangler
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag || inputs.release_sha || 'main' }}

      - name: Checkout workflow helpers
        uses: actions/checkout@v4
        with:
          path: .github-workflow-tools
          ref: ${{ github.sha }}
          sparse-checkout: |
            .github/scripts

      - name: Fetch release tags
        run: git fetch --tags origin

      - name: Determine deploy operation
        id: operation
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            operation="deploy"
          else
            operation="${{ inputs.operation || 'deploy' }}"
          fi

          echo "operation=${operation}" >> "${GITHUB_OUTPUT}"
          echo "CF_MAIL_DEPLOY_OPERATION=${operation}" >> "${GITHUB_ENV}"

      - name: Validate D1 restore inputs
        id: restore-inputs
        if: steps.operation.outputs.operation == 'restore-d1'
        shell: bash
        run: |
          set -euo pipefail
          restore_timestamp="${{ inputs.restore_timestamp }}"
          restore_bookmark="${{ inputs.restore_bookmark }}"
          restore_reason="${{ inputs.restore_reason || 'manual disaster recovery' }}"

          if [ -n "${restore_timestamp}" ] && [ -n "${restore_bookmark}" ]; then
            echo "Provide either restore_timestamp or restore_bookmark, not both." >&2
            exit 1
          fi

          if [ -z "${restore_timestamp}" ] && [ -z "${restore_bookmark}" ]; then
            echo "restore-d1 requires restore_timestamp or restore_bookmark." >&2
            exit 1
          fi

          if [ -n "${restore_timestamp}" ]; then
            echo "restore_mode=timestamp" >> "${GITHUB_OUTPUT}"
            echo "restore_value=${restore_timestamp}" >> "${GITHUB_OUTPUT}"
          else
            echo "restore_mode=bookmark" >> "${GITHUB_OUTPUT}"
            echo "restore_value=${restore_bookmark}" >> "${GITHUB_OUTPUT}"
          fi

          echo "restore_reason=${restore_reason}" >> "${GITHUB_OUTPUT}"

      - name: Resolve deployed release metadata
        if: steps.operation.outputs.operation == 'deploy'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            release_tag="${{ github.event.release.tag_name }}"
            release_version="${release_tag#v}"
            release_branch="${{ github.event.release.target_commitish || 'main' }}"
          else
            requested_release_tag="${{ inputs.release_tag }}"
            requested_release_sha="${{ inputs.release_sha }}"
            checked_out_sha="$(git rev-parse HEAD)"
            release_branch="${{ inputs.release_branch || 'main' }}"

            if [ -n "${requested_release_sha}" ]; then
              requested_release_commit="$(git rev-parse --verify "${requested_release_sha}^{commit}" 2>/dev/null || true)"
              if [ -z "${requested_release_commit}" ]; then
                echo "workflow_dispatch release_sha ${requested_release_sha} does not resolve to a fetched commit." >&2
                exit 1
              fi

              if [ "${requested_release_commit}" != "${checked_out_sha}" ]; then
                echo "workflow_dispatch release_sha ${requested_release_sha} resolves to ${requested_release_commit}, but checkout resolved to ${checked_out_sha}." >&2
                exit 1
              fi
            fi

            if [ -n "${requested_release_tag}" ]; then
              tag_commit_sha="$(git rev-parse --verify "${requested_release_tag}^{commit}" 2>/dev/null || true)"
              if [ -z "${tag_commit_sha}" ]; then
                echo "workflow_dispatch release_tag ${requested_release_tag} does not resolve to a fetched commit." >&2
                exit 1
              fi

              if [ "${tag_commit_sha}" != "${checked_out_sha}" ]; then
                echo "workflow_dispatch release_tag ${requested_release_tag} points at ${tag_commit_sha}, but checkout resolved to ${checked_out_sha}; deploy inputs must reference the same release." >&2
                exit 1
              fi

              release_tag="${requested_release_tag}"
            else
              release_tag="$(git tag --points-at HEAD --list 'v*' | sort -V | tail -n 1)"
            fi

            if [ -z "${release_tag}" ]; then
              echo "workflow_dispatch requires release_tag or a tag pointing at the checked out commit" >&2
              exit 1
            fi

            release_version="${release_tag#v}"
          fi

          echo "CF_MAIL_RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"
          echo "CF_MAIL_RELEASE_VERSION=${release_version}" >> "${GITHUB_ENV}"
          echo "CF_MAIL_RELEASE_SHA=$(git rev-parse --short HEAD)" >> "${GITHUB_ENV}"
          echo "CF_MAIL_RELEASE_BRANCH=${release_branch}" >> "${GITHUB_ENV}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write version metadata
        if: steps.operation.outputs.operation == 'deploy'
        run: bun run version:write

      - name: Resolve Cloudflare API tokens
        shell: bash
        run: |
          set -euo pipefail
          d1_token="${CLOUDFLARE_API_TOKEN:-}"
          deploy_token="${CLOUDFLARE_DEPLOY_API_TOKEN:-}"

          if [ -z "${d1_token}" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN. D1 migrations and Time Travel operations require a Cloudflare token with D1 scope." >&2
            exit 1
          fi

          if [ -z "${deploy_token}" ]; then
            deploy_token="${d1_token}"
          fi

          echo "CF_MAIL_D1_API_TOKEN=${d1_token}" >> "${GITHUB_ENV}"
          echo "CF_MAIL_DEPLOY_API_TOKEN=${deploy_token}" >> "${GITHUB_ENV}"

      - name: Render API Worker deploy config
        if: steps.operation.outputs.operation == 'deploy'
        shell: bash
        run: |
          set -euo pipefail
          generated_config_path="apps/api-worker/wrangler.deploy.generated.jsonc"
          node scripts/render-api-worker-deploy-config.mjs \
            apps/api-worker/wrangler.jsonc \
            "${generated_config_path}"
          echo "API_WORKER_CONFIG_PATH=${generated_config_path}" >> "${GITHUB_ENV}"

      - name: Ensure API Worker queues exist
        if: steps.operation.outputs.operation == 'deploy'
        shell: bash
        run: |
          set -euo pipefail
          helper_script=".github-workflow-tools/.github/scripts/deploy_main_helpers.mjs"
          queue_names="$(node "${helper_script}" queue-names "${API_WORKER_CONFIG_PATH}")"

          if [ -z "${queue_names}" ]; then
            echo "No API Worker queues declared; skipping queue provisioning."
            exit 0
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID; queue provisioning requires the account-scoped Queues API." >&2
            exit 1
          fi

          while IFS= read -r queue_name; do
            [ -n "${queue_name}" ] || continue

            export TARGET_QUEUE_NAME="${queue_name}"
            queue_exists=0
            page=1
            total_pages=1

            while [ "${page}" -le "${total_pages}" ]; do
              existing_queues_json="$(
                curl -fsS \
                  --get \
                  --url "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/queues" \
                  --header "Authorization: Bearer ${CF_MAIL_DEPLOY_API_TOKEN}" \
                  --header "Content-Type: application/json" \
                  --data-urlencode "page=${page}"
              )"
              export EXISTING_QUEUES_JSON="${existing_queues_json}"
              total_pages="$(node "${helper_script}" queue-total-pages)"
              if node "${helper_script}" queue-exists; then
                queue_exists=1
                break
              fi
              page="$((page + 1))"
            done

            if [ "${queue_exists}" -eq 1 ]; then
              echo "Queue ${queue_name} already exists."
              continue
            fi

            echo "Creating missing queue ${queue_name}..."
            CLOUDFLARE_API_TOKEN="${CF_MAIL_DEPLOY_API_TOKEN}" \
              "${WRANGLER_BIN}" queues create "${queue_name}" --config "${API_WORKER_CONFIG_PATH}"
          done <<< "${queue_names}"

      - name: Verify API Worker runtime config wiring
        if: steps.operation.outputs.operation == 'deploy'
        shell: bash
        run: |
          set -euo pipefail
          helper_script=".github-workflow-tools/.github/scripts/deploy_main_helpers.mjs"
          if [ ! -f "${API_WORKER_CONFIG_PATH}" ]; then
            echo "Generated API Worker deploy config is missing: ${API_WORKER_CONFIG_PATH}" >&2
            exit 1
          fi

          render_check_output="$(node "${helper_script}" verify-runtime-config "${API_WORKER_CONFIG_PATH}")"
          printf '%s\n' "${render_check_output}"
          if ! printf '%s' "${render_check_output}" | grep -q "Verified generated runtime CLOUDFLARE_ACCOUNT_ID="; then
            echo "Skipping env.CLOUDFLARE_ACCOUNT_ID dry-run assertion because EMAIL_ROUTING_MANAGEMENT_ENABLED=false for this deployment."
            exit 0
          fi

          dry_run_output_file="${RUNNER_TEMP}/api-worker-dry-run.txt"
          CLOUDFLARE_API_TOKEN="${CF_MAIL_DEPLOY_API_TOKEN}" "${WRANGLER_BIN}" deploy --dry-run --config "${API_WORKER_CONFIG_PATH}" >"${dry_run_output_file}" 2>&1
          if ! grep -q "env.CLOUDFLARE_ACCOUNT_ID" "${dry_run_output_file}"; then
            cat "${dry_run_output_file}"
            echo "Expected wrangler dry-run to expose env.CLOUDFLARE_ACCOUNT_ID in the API Worker runtime bindings." >&2
            exit 1
          fi
      - name: Restore remote D1 from Time Travel
        if: steps.operation.outputs.operation == 'restore-d1'
        shell: bash
        run: |
          set -euo pipefail
          helper_script=".github-workflow-tools/.github/scripts/deploy_main_helpers.mjs"
          restore_mode="${{ steps.restore-inputs.outputs.restore_mode }}"
          restore_value="${{ steps.restore-inputs.outputs.restore_value }}"
          restore_reason="${{ steps.restore-inputs.outputs.restore_reason }}"

          if [ "${restore_mode}" = "timestamp" ]; then
            restore_output="$(CLOUDFLARE_API_TOKEN="${CF_MAIL_D1_API_TOKEN}" "${WRANGLER_BIN}" d1 time-travel restore kaisoumail-db --config apps/api-worker/wrangler.jsonc --timestamp "${restore_value}" --json)"
          else
            restore_output="$(CLOUDFLARE_API_TOKEN="${CF_MAIL_D1_API_TOKEN}" "${WRANGLER_BIN}" d1 time-travel restore kaisoumail-db --config apps/api-worker/wrangler.jsonc --bookmark "${restore_value}" --json)"
          fi

          export D1_RESTORE_OUTPUT="${restore_output}"
          undo_bookmark="$(node "${helper_script}" extract-undo-bookmark)"

          printf '%s\n' "${restore_output}"
          {
            echo "## D1 restore"
            echo
            echo "- Mode: ${restore_mode}"
            echo "- Target: ${restore_value}"
            echo "- Reason: ${restore_reason}"
            if [ -n "${undo_bookmark}" ]; then
              echo "- Undo bookmark: ${undo_bookmark}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Verify API Worker required secrets
        if: steps.operation.outputs.operation == 'deploy'
        shell: bash
        run: |
          set -euo pipefail
          helper_script=".github-workflow-tools/.github/scripts/deploy_main_helpers.mjs"
          secrets_json="$(CLOUDFLARE_API_TOKEN="${CF_MAIL_DEPLOY_API_TOKEN}" "${WRANGLER_BIN}" secret list --config "${API_WORKER_CONFIG_PATH}" --format json)"
          export SECRETS_JSON="${secrets_json}"
          runtime_contract_env_file="${RUNNER_TEMP}/api-worker-runtime-contract.env"
          node "${helper_script}" verify-required-secrets "${API_WORKER_CONFIG_PATH}" "${runtime_contract_env_file}"
          cat "${runtime_contract_env_file}" >> "${GITHUB_ENV}"
      - name: Capture D1 disaster-recovery timestamp
        if: steps.operation.outputs.operation == 'deploy'
        shell: bash
        run: |
          set -euo pipefail
          restore_timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "D1_PRE_DEPLOY_RESTORE_TIMESTAMP=${restore_timestamp}" >> "${GITHUB_ENV}"
          {
            echo "## Deploy recovery anchor"
            echo
            echo "- Release: ${CF_MAIL_RELEASE_TAG} (${CF_MAIL_RELEASE_SHA})"
            echo "- D1 Time Travel timestamp: ${restore_timestamp}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Assess release D1 rollback contract
        id: release-migration-contract
        if: steps.operation.outputs.operation == 'deploy'
        shell: bash
        run: |
          set -euo pipefail
          target_commit="$(git rev-parse --verify "${CF_MAIL_RELEASE_TAG}^{commit}" 2>/dev/null || true)"
          if [ -z "${target_commit}" ]; then
            echo "Release tag ${CF_MAIL_RELEASE_TAG} is not present in the fetched v* tag set; automatic deploy requires a tagged release commit." >&2
            exit 1
          fi

          previous_release_tag="$(git describe --first-parent --tags --abbrev=0 --match 'v*' --exclude '*-rc.*' "${target_commit}^" 2>/dev/null || true)"
          release_contains_migrations="false"

          if [ -z "${previous_release_tag}" ]; then
            {
              echo "## Release rollback contract"
              echo
              echo "- Previous release tag: unavailable"
              echo "- Release contains D1 migrations relative to previous release: unknown"
              echo "- Post-cutover behavior: automatic deploy stops here because the release lineage cannot prove this deploy is schema-stable or provide a safe rollback target."
            } >> "${GITHUB_STEP_SUMMARY}"
            echo "Cannot determine a previous release tag on the same lineage for ${CF_MAIL_RELEASE_TAG}; bootstrap or release-tag gaps must use manual rollout." >&2
            exit 1
          fi

          if git diff --name-only "${previous_release_tag}..${CF_MAIL_RELEASE_TAG}" -- apps/api-worker/drizzle | grep -q .; then
            release_contains_migrations="true"
          fi

          echo "lineage_resolved=true" >> "${GITHUB_OUTPUT}"
          echo "previous_release_tag=${previous_release_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_contains_migrations=${release_contains_migrations}" >> "${GITHUB_OUTPUT}"

          {
            echo "## Release rollback contract"
            echo
            echo "- Previous release tag: ${previous_release_tag}"
            echo "- Release contains D1 migrations relative to previous release: ${release_contains_migrations}"
            if [ "${release_contains_migrations}" = "true" ]; then
              echo "- Post-cutover behavior: automatic API Worker rollback is disabled because this release is migration-bearing even if its migrations were applied before the workflow started."
            else
              echo "- Post-cutover behavior: automatic API Worker rollback can stay enabled if remote D1 also has zero pending migrations at deploy time."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Validate pending remote D1 migrations against auto-release contract
        id: pending-migrations
        if: steps.operation.outputs.operation == 'deploy'
        shell: bash
        run: |
          set -euo pipefail
          pending_migrations_output="${RUNNER_TEMP}/pending-d1-migrations.txt"
          CLOUDFLARE_API_TOKEN="${CF_MAIL_D1_API_TOKEN}" "${WRANGLER_BIN}" d1 migrations list kaisoumail-db --remote --config "${API_WORKER_CONFIG_PATH}" | tee "${pending_migrations_output}"
          python3 .github/scripts/pending_migration_gate.py \
            --migrations-dir apps/api-worker/drizzle \
            --wrangler-output-file "${pending_migrations_output}"

          export PENDING_MIGRATIONS_OUTPUT="${pending_migrations_output}"
          pending_count="$(python3 - <<'PY2'
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, ".github/scripts")
          from pending_migration_gate import parse_pending_migration_names

          raw_output = Path(os.environ["PENDING_MIGRATIONS_OUTPUT"]).read_text(encoding="utf-8")
          print(len(parse_pending_migration_names(raw_output)))
          PY2
          )"

          release_contains_migrations="${{ steps.release-migration-contract.outputs.release_contains_migrations }}"

          echo "count=${pending_count}" >> "${GITHUB_OUTPUT}"
          if [ "${pending_count}" -eq 0 ] && [ "${release_contains_migrations}" = "false" ]; then
            echo "rollback_safe=true" >> "${GITHUB_OUTPUT}"
          else
            echo "rollback_safe=false" >> "${GITHUB_OUTPUT}"
          fi

          {
            echo "## Pending remote D1 migrations"
            echo
            echo "- Count: ${pending_count}"
            echo "- Release contains D1 migrations relative to previous release: ${release_contains_migrations}"
            if [ "${pending_count}" -eq 0 ] && [ "${release_contains_migrations}" = "false" ]; then
              echo "- Post-cutover behavior: automatic API Worker rollback remains available because this release is schema-stable and remote D1 has zero pending migrations."
            elif [ "${release_contains_migrations}" = "true" ]; then
              echo "- Post-cutover behavior: automatic API Worker rollback is disabled after promotion because this release is migration-bearing, even if those migrations were already applied before the workflow started."
            else
              echo "- Post-cutover behavior: automatic API Worker rollback is disabled after promotion because remote D1 still has migrations to apply for this release."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Capture current API Worker stable baseline
        id: stable-baseline
        if: steps.operation.outputs.operation == 'deploy'
        shell: bash
        run: |
          set -euo pipefail
          helper_script=".github-workflow-tools/.github/scripts/deploy_main_helpers.mjs"
          deployments_json="$(CLOUDFLARE_API_TOKEN="${CF_MAIL_DEPLOY_API_TOKEN}" "${WRANGLER_BIN}" deployments list --config "${API_WORKER_CONFIG_PATH}" --json)"
          export DEPLOYMENTS_JSON="${deployments_json}"
          node "${helper_script}" stable-baseline | tee -a "${GITHUB_OUTPUT}"

      - name: Record API Worker rollback availability
        if: steps.operation.outputs.operation == 'deploy'
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## API version baseline"
            echo
            echo "- Stable version ID: ${{ steps.stable-baseline.outputs.version_id }}"
            if [ "${{ steps.pending-migrations.outputs.rollback_safe }}" = "true" ]; then
              echo "- Post-cutover rollback: enabled"
            else
              echo "- Post-cutover rollback: disabled after promotion because this release is migration-bearing or otherwise not schema-stable."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Apply remote D1 migrations
        if: steps.operation.outputs.operation == 'deploy'
        run: |
          CLOUDFLARE_API_TOKEN="${CF_MAIL_D1_API_TOKEN}" "${WRANGLER_BIN}" d1 migrations apply kaisoumail-db --remote --config "${API_WORKER_CONFIG_PATH}"

      - name: Upload candidate API Worker version
        id: api-candidate
        if: steps.operation.outputs.operation == 'deploy'
        shell: bash
        run: |
          set -euo pipefail
          helper_script=".github-workflow-tools/.github/scripts/deploy_main_helpers.mjs"
          output_file="${RUNNER_TEMP}/wrangler-version-upload.jsonl"
          candidate_env_file="${RUNNER_TEMP}/api-candidate.env"
          rm -f "${output_file}" "${candidate_env_file}"

          CLOUDFLARE_API_TOKEN="${CF_MAIL_DEPLOY_API_TOKEN}" WRANGLER_OUTPUT_FILE_PATH="${output_file}" "${WRANGLER_BIN}" versions upload \
            --config "${API_WORKER_CONFIG_PATH}" \
            --tag "${CF_MAIL_RELEASE_TAG}" \
            --message "Release ${CF_MAIL_RELEASE_TAG} (${CF_MAIL_RELEASE_SHA})"

          node "${helper_script}" extract-version-upload "${output_file}" "${candidate_env_file}"

          cat "${candidate_env_file}" >> "${GITHUB_OUTPUT}"
          # shellcheck disable=SC1090
          source "${candidate_env_file}"

          {
            echo "## API candidate"
            echo
            echo "- Version ID: ${version_id}"
            echo "- Preview flow: custom-domain shadow deploy with version override headers (no workers.dev preview URL required)"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Add candidate API Worker to active deployment at 0%
        id: api-shadow
        if: steps.operation.outputs.operation == 'deploy'
        shell: bash
        run: |
          set -euo pipefail
          stable_version_id="${{ steps.stable-baseline.outputs.version_id }}"
          candidate_version_id="${{ steps.api-candidate.outputs.version_id }}"

          CLOUDFLARE_API_TOKEN="${CF_MAIL_DEPLOY_API_TOKEN}" "${WRANGLER_BIN}" versions deploy \
            --config "${API_WORKER_CONFIG_PATH}" \
            "${stable_version_id}@100%" \
            "${candidate_version_id}@0%" \
            --message "Shadow deploy ${CF_MAIL_RELEASE_TAG} (${CF_MAIL_RELEASE_SHA}) for custom-domain smoke" \
            --yes

          {
            echo "## API shadow deploy"
            echo
            echo "- Stable version: ${stable_version_id} @ 100%"
            echo "- Candidate version: ${candidate_version_id} @ 0%"
            echo "- Validation path: custom-domain smoke requests with Cloudflare-Workers-Version-Overrides"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Smoke test shadow API Worker through version override
        if: steps.operation.outputs.operation == 'deploy'
        shell: bash
        env:
          API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          API_OVERRIDE_VERSION_ID: ${{ steps.api-candidate.outputs.version_id }}
          API_STABLE_VERSION_ID: ${{ steps.stable-baseline.outputs.version_id }}
          EXPECT_CLOUDFLARE_DOMAIN_LIFECYCLE_ENABLED: ${{ env.API_EXPECTS_CLOUDFLARE_DOMAIN_LIFECYCLE_ENABLED }}
          EXPECT_CLOUDFLARE_DOMAIN_BINDING_ENABLED: ${{ env.API_EXPECTS_CLOUDFLARE_DOMAIN_BINDING_ENABLED }}
        run: |
          set -euo pipefail
          api_base_url="${API_BASE_URL%/}"
          if [ -z "${api_base_url}" ]; then
            echo "Missing VITE_API_BASE_URL for shadow API smoke gate" >&2
            exit 1
          fi

          worker_name="$(node -pe "JSON.parse(require('node:fs').readFileSync(process.env.API_WORKER_CONFIG_PATH, 'utf8')).name")"
          override_header="Cloudflare-Workers-Version-Overrides: ${worker_name}=\"${API_OVERRIDE_VERSION_ID}\""
          health_file="${RUNNER_TEMP}/preview-api-health.json"
          version_file="${RUNNER_TEMP}/preview-api-version.json"
          meta_file="${RUNNER_TEMP}/preview-api-meta.json"

          for attempt in 1 2 3 4 5 6; do
            health_code="$(curl -sS -o "${health_file}" -w "%{http_code}" -H "${override_header}" "${api_base_url}/health" || true)"
            version_code="$(curl -sS -o "${version_file}" -w "%{http_code}" -H "${override_header}" "${api_base_url}/api/version" || true)"
            meta_code="$(curl -sS -o "${meta_file}" -w "%{http_code}" -H "${override_header}" "${api_base_url}/api/meta" || true)"

            export HEALTH_CODE="${health_code}"
            export VERSION_CODE="${version_code}"
            export META_CODE="${meta_code}"
            export HEALTH_FILE="${health_file}"
            export VERSION_FILE="${version_file}"
            export META_FILE="${meta_file}"
            export EXPECTED_SHA="${CF_MAIL_RELEASE_SHA}"

            if SMOKE_LABEL="Preview" node .github/scripts/verify_api_smoke.mjs
            then
              {
                echo "## API shadow smoke"
                echo
                echo "- Base URL: ${api_base_url}"
                echo "- Worker name: ${worker_name}"
                echo "- Candidate version: ${API_OVERRIDE_VERSION_ID}"
                echo "- Stable version: ${API_STABLE_VERSION_ID}"
                echo "- Mechanism: active deployment kept at stable 100% + candidate 0%; smoke requests force the candidate with Cloudflare-Workers-Version-Overrides."
              } >> "${GITHUB_STEP_SUMMARY}"
              exit 0
            fi

            echo "Shadow smoke gate attempt ${attempt} not ready yet; retrying..."
            echo "/health => ${health_code} $(cat "${health_file}" 2>/dev/null || true)"
            echo "/api/version => ${version_code} $(cat "${version_file}" 2>/dev/null || true)"
            echo "/api/meta => ${meta_code} $(cat "${meta_file}" 2>/dev/null || true)"

            if [ "${attempt}" -eq 6 ]; then
              echo "Shadow API Worker failed smoke gate after ${attempt} attempts; restoring stable-only deployment ${API_STABLE_VERSION_ID}" >&2
              CLOUDFLARE_API_TOKEN="${CF_MAIL_DEPLOY_API_TOKEN}" "${WRANGLER_BIN}" versions deploy \
                --config "${API_WORKER_CONFIG_PATH}" \
                "${API_STABLE_VERSION_ID}@100%" \
                --message "Restore stable-only deploy after failed shadow smoke for ${CF_MAIL_RELEASE_SHA}" \
                --yes || true
              exit 1
            fi

            sleep "$((attempt * 5))"
          done
      - name: Promote candidate API Worker to production
        if: steps.operation.outputs.operation == 'deploy'
        run: |
          CLOUDFLARE_API_TOKEN="${CF_MAIL_DEPLOY_API_TOKEN}" "${WRANGLER_BIN}" versions deploy \
            --config "${API_WORKER_CONFIG_PATH}" \
            --version-id "${{ steps.api-candidate.outputs.version_id }}" \
            --percentage 100 \
            --message "Promote ${CF_MAIL_RELEASE_TAG} (${CF_MAIL_RELEASE_SHA})" \
            --yes

      - name: Smoke test promoted production API Worker
        if: steps.operation.outputs.operation == 'deploy'
        shell: bash
        env:
          API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          API_ROLLBACK_VERSION_ID: ${{ steps.stable-baseline.outputs.version_id }}
          AUTO_API_ROLLBACK: ${{ steps.pending-migrations.outputs.rollback_safe }}
          EXPECT_CLOUDFLARE_DOMAIN_LIFECYCLE_ENABLED: ${{ env.API_EXPECTS_CLOUDFLARE_DOMAIN_LIFECYCLE_ENABLED }}
          EXPECT_CLOUDFLARE_DOMAIN_BINDING_ENABLED: ${{ env.API_EXPECTS_CLOUDFLARE_DOMAIN_BINDING_ENABLED }}
        run: |
          set -euo pipefail
          api_base_url="${API_BASE_URL%/}"
          if [ -z "${api_base_url}" ]; then
            echo "Missing VITE_API_BASE_URL for deploy smoke gate" >&2
            exit 1
          fi

          health_file="${RUNNER_TEMP}/api-health.json"
          version_file="${RUNNER_TEMP}/api-version.json"
          meta_file="${RUNNER_TEMP}/api-meta.json"

          for attempt in 1 2 3 4 5 6; do
            health_code="$(curl -sS -o "${health_file}" -w "%{http_code}" "${api_base_url}/health" || true)"
            version_code="$(curl -sS -o "${version_file}" -w "%{http_code}" "${api_base_url}/api/version" || true)"
            meta_code="$(curl -sS -o "${meta_file}" -w "%{http_code}" "${api_base_url}/api/meta" || true)"

            export HEALTH_CODE="${health_code}"
            export VERSION_CODE="${version_code}"
            export META_CODE="${meta_code}"
            export HEALTH_FILE="${health_file}"
            export VERSION_FILE="${version_file}"
            export META_FILE="${meta_file}"
            export EXPECTED_SHA="${CF_MAIL_RELEASE_SHA}"

            if SMOKE_LABEL="Production" node .github/scripts/verify_api_smoke.mjs
            then
              exit 0
            fi

            echo "Production smoke gate attempt ${attempt} not ready yet; retrying..."
            echo "/health => ${health_code} $(cat "${health_file}" 2>/dev/null || true)"
            echo "/api/version => ${version_code} $(cat "${version_file}" 2>/dev/null || true)"
            echo "/api/meta => ${meta_code} $(cat "${meta_file}" 2>/dev/null || true)"

            if [ "${attempt}" -eq 6 ]; then
              echo "Promoted API Worker failed production smoke gate after ${attempt} attempts" >&2
              if [ "${AUTO_API_ROLLBACK}" = "true" ]; then
                echo "Rolling API Worker back to ${API_ROLLBACK_VERSION_ID}" >&2
                CLOUDFLARE_API_TOKEN="${CF_MAIL_DEPLOY_API_TOKEN}" "${WRANGLER_BIN}" rollback "${API_ROLLBACK_VERSION_ID}" \
                  --config "${API_WORKER_CONFIG_PATH}" \
                  --message "Rollback failed deploy smoke gate for ${CF_MAIL_RELEASE_SHA}" \
                  --yes
              else
                {
                  echo "## Production API smoke"
                  echo
                  echo "- Result: fail"
                  echo "- Recovery: automatic API Worker rollback is disabled because this release is migration-bearing or otherwise not rollback-safe after the D1 schema changes involved in this deploy."
                  echo "- D1 restore anchor: ${D1_PRE_DEPLOY_RESTORE_TIMESTAMP}"
                  echo "- Next step: inspect the promoted Worker, and if you need to recover the pre-deploy database state, run this workflow again with operation=restore-d1 before coordinating a Worker rollback."
                } >> "${GITHUB_STEP_SUMMARY}"
                echo "Automatic API Worker rollback is disabled because this release is not rollback-safe after the D1 schema changes involved in this deploy. Investigate manually or run the explicit D1 restore workflow before any coordinated rollback." >&2
              fi
              exit 1
            fi

            sleep "$((attempt * 5))"
          done

      - name: Apply API Worker triggers
        if: steps.operation.outputs.operation == 'deploy'
        shell: bash
        run: |
          set -euo pipefail
          if CLOUDFLARE_API_TOKEN="${CF_MAIL_DEPLOY_API_TOKEN}" "${WRANGLER_BIN}" triggers deploy --config "${API_WORKER_CONFIG_PATH}"; then
            exit 0
          fi

          {
            echo "## API trigger deploy"
            echo
            echo "- Result: fail"
            echo "- Warning: \`wrangler triggers deploy\` can partially apply routes, custom domains, or cron triggers before reporting an error."
            echo "- Recovery: stop the deploy, inspect current trigger state in Cloudflare, and only then decide whether to retry or run a manual rollback."
            echo "- Note: Worker version rollback is intentionally skipped here because it does not restore partially applied trigger state."
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "Applying API Worker triggers failed. Stopping without automatic rollback because version rollback does not restore trigger state." >&2
          exit 1

      - name: Smoke test production API after trigger apply
        if: steps.operation.outputs.operation == 'deploy'
        shell: bash
        env:
          API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          EXPECT_CLOUDFLARE_DOMAIN_LIFECYCLE_ENABLED: ${{ env.API_EXPECTS_CLOUDFLARE_DOMAIN_LIFECYCLE_ENABLED }}
          EXPECT_CLOUDFLARE_DOMAIN_BINDING_ENABLED: ${{ env.API_EXPECTS_CLOUDFLARE_DOMAIN_BINDING_ENABLED }}
        run: |
          set -euo pipefail
          api_smoke_urls=()
          while IFS= read -r smoke_url; do
            if [ -n "${smoke_url}" ]; then
              api_smoke_urls+=("${smoke_url}")
            fi
          done < <(
            VITE_API_BASE_URL="${API_BASE_URL}" \
              node .github/scripts/resolve_api_smoke_urls.mjs "${API_WORKER_CONFIG_PATH}"
          )

          if [ "${#api_smoke_urls[@]}" -eq 0 ]; then
            echo "Unable to resolve any post-trigger API smoke URLs from ${API_WORKER_CONFIG_PATH} or VITE_API_BASE_URL." >&2
            exit 1
          fi

          for smoke_target in "${api_smoke_urls[@]}"; do
            api_base_url="${smoke_target%/}"
            health_file="${RUNNER_TEMP}/post-trigger-api-health.json"
            version_file="${RUNNER_TEMP}/post-trigger-api-version.json"
            meta_file="${RUNNER_TEMP}/post-trigger-api-meta.json"

            echo "Post-trigger smoke target: ${api_base_url}"

            for attempt in 1 2 3 4 5 6; do
              health_code="$(curl -sS -o "${health_file}" -w "%{http_code}" "${api_base_url}/health" || true)"
              version_code="$(curl -sS -o "${version_file}" -w "%{http_code}" "${api_base_url}/api/version" || true)"
              meta_code="$(curl -sS -o "${meta_file}" -w "%{http_code}" "${api_base_url}/api/meta" || true)"

              export HEALTH_CODE="${health_code}"
              export VERSION_CODE="${version_code}"
              export META_CODE="${meta_code}"
              export HEALTH_FILE="${health_file}"
              export VERSION_FILE="${version_file}"
              export META_FILE="${meta_file}"
              export EXPECTED_SHA="${CF_MAIL_RELEASE_SHA}"

              if SMOKE_LABEL="Post-trigger ${api_base_url}" node .github/scripts/verify_api_smoke.mjs
              then
                break
              fi

              echo "Post-trigger smoke gate attempt ${attempt} not ready yet for ${api_base_url}; retrying..."
              echo "/health => ${health_code} $(cat "${health_file}" 2>/dev/null || true)"
              echo "/api/version => ${version_code} $(cat "${version_file}" 2>/dev/null || true)"
              echo "/api/meta => ${meta_code} $(cat "${meta_file}" 2>/dev/null || true)"

              if [ "${attempt}" -eq 6 ]; then
                {
                  echo "## Post-trigger production smoke"
                  echo
                  echo "- Result: fail"
                  echo "- Target: ${api_base_url}"
                  echo "- Recovery: trigger changes have already been applied, so the workflow stops for manual inspection instead of attempting an automatic version rollback."
                  echo "- Next step: inspect current trigger state in Cloudflare and decide whether to retry trigger deployment, roll the Worker version back manually, or run the explicit restore-d1 workflow."
                } >> "${GITHUB_STEP_SUMMARY}"
                echo "Production API failed post-trigger smoke after ${attempt} attempts for ${api_base_url}; stopping for manual inspection because trigger state may already be partially cut over." >&2
                exit 1
              fi

              sleep "$((attempt * 5))"
            done
          done

      - name: Deploy Email receiver Worker
        if: steps.operation.outputs.operation == 'deploy'
        run: |
          CLOUDFLARE_API_TOKEN="${CF_MAIL_DEPLOY_API_TOKEN}" "${WRANGLER_BIN}" deploy --config apps/api-worker/wrangler.email.jsonc

      - name: Build web app
        if: steps.operation.outputs.operation == 'deploy'
        run: bun run --cwd apps/web build

      - name: Resolve Pages same-origin smoke origins
        id: pages-smoke
        if: steps.operation.outputs.operation == 'deploy'
        shell: bash
        env:
          PAGES_SMOKE_ORIGINS: ${{ vars.CF_PAGES_SMOKE_ORIGINS }}
        run: |
          set -euo pipefail
          pages_smoke_file="${RUNNER_TEMP}/pages-smoke-origins.txt"
          rm -f "${pages_smoke_file}"

          CF_PAGES_SMOKE_ORIGINS="${PAGES_SMOKE_ORIGINS}" \
            node .github/scripts/resolve_pages_smoke_origins.mjs > "${pages_smoke_file}"

          if [ ! -s "${pages_smoke_file}" ]; then
            echo "Missing CF_PAGES_SMOKE_ORIGINS. Set it to a comma-separated list of Pages origins that must pass same-origin /api/version smoke after deploy." >&2
            exit 1
          fi

          echo "file=${pages_smoke_file}" >> "${GITHUB_OUTPUT}"

          {
            echo "## Pages same-origin smoke targets"
            echo
            while IFS= read -r pages_origin; do
              if [ -n "${pages_origin}" ]; then
                echo "- ${pages_origin}"
              fi
            done < "${pages_smoke_file}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Deploy Pages
        if: steps.operation.outputs.operation == 'deploy'
        shell: bash
        run: |
          set -euo pipefail
          repo_root="$(pwd)"
          pages_wrangler_bin="${repo_root}/apps/api-worker/node_modules/.bin/wrangler"

          for attempt in 1 2 3; do
            if (
              cd apps/web
              CLOUDFLARE_API_TOKEN="${CF_MAIL_DEPLOY_API_TOKEN}" \
                "${pages_wrangler_bin}" pages deploy \
                --project-name "${CF_PAGES_PROJECT_NAME:-kaisoumail}" \
                --branch main
            ); then
              exit 0
            fi

            if [ "${attempt}" -eq 3 ]; then
              echo "Cloudflare Pages deploy failed after ${attempt} attempts" >&2
              exit 1
            fi

            sleep "$((attempt * 15))"
          done

      - name: Smoke test Pages same-origin API aliases
        if: steps.operation.outputs.operation == 'deploy'
        shell: bash
        env:
          PAGES_SMOKE_ORIGINS_FILE: ${{ steps.pages-smoke.outputs.file }}
        run: |
          set -euo pipefail
          pages_smoke_file="${PAGES_SMOKE_ORIGINS_FILE}"

          if [ -z "${pages_smoke_file}" ] || [ ! -f "${pages_smoke_file}" ]; then
            echo "Pages same-origin smoke targets were not resolved before deploy." >&2
            exit 1
          fi

          while IFS= read -r pages_origin; do
            if [ -z "${pages_origin}" ]; then
              continue
            fi

            version_file="${RUNNER_TEMP}/pages-api-version.json"
            pages_api_base="${pages_origin%/}/api"

            echo "Pages same-origin smoke target: ${pages_api_base}"

            for attempt in 1 2 3 4 5 6; do
              version_code="$(curl -sS -o "${version_file}" -w "%{http_code}" "${pages_api_base}/version" || true)"

              export VERSION_CODE="${version_code}"
              export VERSION_FILE="${version_file}"
              export EXPECTED_SHA="${CF_MAIL_RELEASE_SHA}"

              if SMOKE_LABEL="Pages ${pages_origin}" node .github/scripts/verify_pages_api_smoke.mjs
              then
                {
                  echo "## Pages same-origin smoke"
                  echo
                  echo "- Target: ${pages_api_base}"
                  echo "- Result: pass"
                } >> "${GITHUB_STEP_SUMMARY}"
                break
              fi

              echo "Pages same-origin smoke attempt ${attempt} not ready yet for ${pages_api_base}; retrying..."
              echo "/api/version => ${version_code} $(cat "${version_file}" 2>/dev/null || true)"

              if [ "${attempt}" -eq 6 ]; then
                {
                  echo "## Pages same-origin smoke"
                  echo
                  echo "- Result: fail"
                  echo "- Target: ${pages_api_base}"
                  echo "- Recovery: Pages was deployed, but the first-party same-origin /api path did not reach the expected release SHA. Inspect the Pages Function binding and active Pages deployment before declaring the release healthy."
                } >> "${GITHUB_STEP_SUMMARY}"
                echo "Pages same-origin smoke failed after ${attempt} attempts for ${pages_api_base}" >&2
                exit 1
              fi

              sleep "$((attempt * 5))"
            done
          done < "${pages_smoke_file}"
