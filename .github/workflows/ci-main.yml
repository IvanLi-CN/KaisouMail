name: CI Main

on:
  push:
    branches:
      - main

concurrency:
  group: ci-main-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check release helper syntax
        run: |
          python3 -m py_compile .github/scripts/metadata_gate.py .github/scripts/migration_safety_gate.py .github/scripts/pending_migration_gate.py .github/scripts/release_snapshot.py
          node --check .github/scripts/verify_api_smoke.mjs
          node --check .github/scripts/resolve_api_smoke_urls.mjs

      - name: Release helper self-tests
        run: |
          bash .github/scripts/test-write-version.sh
          bash .github/scripts/test-metadata-gate.sh
          bash .github/scripts/test-migration-safety.sh
          bash .github/scripts/test-pending-migration-gate.sh
          bash .github/scripts/test-verify-api-smoke.sh
          bash .github/scripts/test-resolve-api-smoke-urls.sh
          bash .github/scripts/test-release-snapshot.sh

      - name: Lint and format check
        run: bun run check


  migration-safety:
    name: Migration Safety Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run migration safety gate
        shell: bash
        run: |
          set -euo pipefail
          base_ref="${{ github.event.before }}"
          head_ref="${{ github.sha }}"

          if [ -z "${base_ref}" ] || [ "${base_ref}" = "0000000000000000000000000000000000000000" ]; then
            base_ref="$(git rev-parse "${head_ref}^" 2>/dev/null || git merge-base origin/main "${head_ref}")"
          fi

          mapfile -t changed_migrations < <(
            git diff --name-only "${base_ref}" "${head_ref}" -- 'apps/api-worker/drizzle/*.sql'
          )

          if [ "${#changed_migrations[@]}" -eq 0 ]; then
            echo "No changed D1 migration files detected between ${base_ref} and ${head_ref}."
            exit 0
          fi

          echo 'Checking migration safety for:'
          for migration_file in "${changed_migrations[@]}"; do
            echo " - ${migration_file}"
          done
          python3 .github/scripts/migration_safety_gate.py "${changed_migrations[@]}"

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit tests
        run: bun run test

  storybook-build:
    name: Storybook Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Storybook
        run: bun run build-storybook

  docs-build:
    name: Docs Site Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build docs site
        run: bun run build-docs-site

  worker-build:
    name: Worker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write version metadata
        run: bun run version:write

      - name: Build worker
        run: bun run --cwd apps/api-worker build

  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write version metadata
        run: bun run version:write

      - name: Build web app
        run: bun run --cwd apps/web build

  playwright-smoke:
    name: Playwright Smoke
    runs-on: ubuntu-latest
    env:
      CI: "true"
      VITE_DEMO_MODE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright smoke
        run: bun run test:e2e

  release-snapshot:
    name: Release Snapshot
    runs-on: ubuntu-latest
    needs:
      - lint-and-format
      - migration-safety
      - typecheck
      - unit-tests
      - storybook-build
      - docs-build
      - worker-build
      - web-build
      - playwright-smoke
    permissions:
      actions: read
      contents: write
      issues: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity for release notes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Ensure immutable release snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/release_snapshot.py ensure \
            --target-sha "${GITHUB_SHA}" \
            --github-repository "${GITHUB_REPOSITORY}" \
            --github-token "${GITHUB_TOKEN}" \
            --notes-ref "refs/notes/release-snapshots" \
            --output "${RUNNER_TEMP}/release-snapshot.json"

      - name: Show release snapshot summary
        env:
          SNAPSHOT_PATH: ${{ runner.temp }}/release-snapshot.json
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path(os.environ["SNAPSHOT_PATH"]).read_text())
          print("release_enabled=", payload["release_enabled"])
          print("target_sha=", payload["target_sha"])
          print("release_tag=", payload.get("release_tag", ""))
          print("pr_number=", payload.get("pr_number", ""))
          PY
